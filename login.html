<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • PX TEAM</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0A0F1E, #03060C);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #eee;
      overflow-x: hidden;
    }

    #particles-js {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

.card {
      width: 100%;
      max-width: 420px;
      background: rgba(12, 20, 35, 0.55);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 28px 22px;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      animation: popIn .45s ease both;
      position: relative;
      overflow: hidden;
    }



    @keyframes popIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    h2 {
      text-align: center;
      font-weight: 800;
      font-size: 1.9rem;
      letter-spacing: 0.4px;
      margin-bottom: 14px;
    }

    .sub {
      text-align: center;
      font-size: 0.82rem;
      color: rgba(238,238,238,0.72);
      margin-bottom: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
    }

.field {
      width: 100%;
      padding: 14px 16px;
      margin: 10px 0;
      background: rgba(0,0,0,0.38);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      color: white;
      font-size: 0.98rem;
      outline: none;
      transition: 0.2s;
    }

.field:focus {
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-1px);
    }

.btn {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      margin-top: 15px;
      font-size: 1rem;
      transition: 0.2s;
    }

.btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.28);
      transform: translateY(-1px);
    }

    .msg {
      margin-top: 14px;
      font-size: 0.9rem;
      text-align: center;
      min-height: 1.1em;
    }

    .error { color: #ff6b6b; }
    .success { color: #6bff8e; }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    #resellerFields { display: none; margin-top: 6px; }

    .info-text {
      font-size: 0.78rem;
      color: rgba(238,238,238,0.66);
      margin-bottom: 8px;
      text-align: center;
      display: flex;
      justify-content: center;
      gap: 8px;
      align-items: center;
    }

    @media (max-width: 420px) {
      .card { padding: 22px 16px; border-radius: 22px; }
      h2 { font-size: 1.6rem; }
      .field, .btn { border-radius: 14px; }
    }
  </style>
</head>

<body>
  <div id="particles-js"></div>

  <div class="card">
    <h2><i class="fa-solid fa-user-shield" style="margin-right:10px"></i>LOGIN</h2>
    <div class="sub">
      <span>PX TEAM CONTROL</span>
    </div>

    <input class="field" type="text" id="username" placeholder="Username" autocomplete="off" />
    <input class="field" type="password" id="password" placeholder="Password" />

    <div id="resellerFields">
      <div class="info-text"><i class="fa-solid fa-key" style="opacity:.9"></i> Akun Reseller terdeteksi. Masukkan Device ID.</div>
      <input class="field" type="text" id="deviceId" placeholder="Device ID" autocomplete="off" />
    </div>

    <button class="btn" id="loginBtn" type="button">
      <i class="fa-solid fa-right-to-bracket" style="margin-right:10px"></i>MASUK
    </button>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    // RTDB endpoints (sesuai kebutuhan kamu)
    // 1) Login verifikasi
    const LOGIN_DB_BASE = 'https://admin-login-ab66b-default-rtdb.firebaseio.com/';

    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const deviceIdInput = document.getElementById('deviceId');
    const resellerFields = document.getElementById('resellerFields');
    const msgEl = document.getElementById('msg');

    function setMsg(text, kind) {
      msgEl.textContent = text;
      msgEl.className = 'msg' + (kind ? ' ' + kind : '');
    }

    function safeUpper(x){ return (x || '').toString().trim(); }

    // detect role (reseller -> butuh device id)
    usernameInput.addEventListener('input', async () => {
      const username = safeUpper(usernameInput.value);
      resellerFields.style.display = 'none';
      if (!username) return;

      try {
        const res = await fetch(`${LOGIN_DB_BASE}users/${encodeURIComponent(username)}.json`);
        const user = await res.json();
        if (user && user.role && user.role.toLowerCase() === 'reseller') {
          resellerFields.style.display = 'block';
        }
      } catch (e) {
        // ignore
      }
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const username = safeUpper(usernameInput.value);
      const password = passwordInput.value;
      const deviceId = safeUpper(deviceIdInput?.value);

      if (!username || !password) {
        setMsg('Username dan password harus diisi.', 'error');
        return;
      }

      try {
        const res = await fetch(`${LOGIN_DB_BASE}users/${encodeURIComponent(username)}.json`);
        const user = await res.json();

        if (!user) {
          setMsg('User tidak ditemukan.', 'error');
          return;
        }

        // NOTE: field password di Firebase belum kita kunci namanya.
        // Default: user.password. Kalau beda, nanti tinggal ganti di sini.
        if (user.password !== password) {
          setMsg('Password salah.', 'error');
          return;
        }

        if (user.role && user.role.toLowerCase() === 'reseller') {
          // device validation (sesuaikan field device_id seperti contoh)
          const requiredDevice = user.device_id || user.deviceId || '';
          if (!deviceId || deviceId !== requiredDevice) {
            setMsg('Device ID tidak cocok atau belum diisi.', 'error');
            return;
          }
        }

        // session
        localStorage.setItem('px_u', username);
        localStorage.setItem('px_username', username);
        localStorage.setItem('px_role', user.role || 'user');
        localStorage.setItem('px_name', user.name || username);
        localStorage.setItem('px_device_id', user.device_id || user.deviceId || '');

        setMsg(`Login berhasil sebagai ${(user.role || 'user').toUpperCase()}. Mengalihkan...`, 'success');
        setTimeout(() => {
          window.location.href = 'index2.html';
        }, 450);

      } catch (err) {
        setMsg('Gagal terhubung ke database.', 'error');
      }
    });

    // particles ungu
    particlesJS('particles-js', {
      particles: {
        number: { value: 55 },
        color: { value: '#8b5cf6' },
        opacity: { value: 0.32 },
        size: { value: 2 },
        line_linked: { enable: true, opacity: 0.55, width: 1.2 },
        move: { speed: 1.25 }
      },
      interactivity: {
        events: {
          onhover: { enable: true, mode: 'repulse' },
          onclick: { enable: false }
        },
        modes: { repulse: { distance: 110 } }
      },
      retina_detect: true
    });
  </script>
</body>
</html>
