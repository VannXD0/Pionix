<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory • PX TEAM CONTROL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body class="p-4 md:p-8">
  <div id="particles-js"></div>

  <div class="max-w-5xl mx-auto space-y-6">
    <header class="glass p-6 rounded-3xl flex flex-col md:flex-row md:justify-between md:items-center" data-anim="1">
      <div class="mb-3 md:mb-0">
        <h1 class="text-xl font-bold">PX<span class="text-violet-500"> TEAM CONTROL</span></h1>
        <p class="text-xs text-slate-500 mt-1">
          <i class="fa-solid fa-user"></i> <span id="uName">User</span>
          <i class="fa-solid fa-shield-halved ml-2 mr-1"></i> <span id="uRole">USER</span>
        </p>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="location.href='index2.html'" class="p-2 bg-slate-900 rounded-lg hover:text-violet-500 transition" title="Back"><i class="fa-solid fa-arrow-left"></i></button>

        <button onclick="logout()" class="p-2 bg-slate-900 rounded-lg text-rose-500 hover:bg-rose-950 transition" title="Logout"><i class="fa-solid fa-power-off"></i></button>
      </div>
    </header>

    <section class="glass p-6 rounded-3xl" data-anim="2">
      <div class="flex flex-col md:flex-row md:items-center gap-3 md:gap-4">
        <div class="flex-1">
          <label class="text-sm text-slate-400">Search</label>
          <div class="relative mt-2">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input id="searchBox" type="text" placeholder="Cari: lisensi key / device / exp / username" class="w-full bg-black border border-slate-800 pl-10 pr-3 py-3 rounded-xl outline-none focus:border-violet-500" />
          </div>
        </div>
        <div class="md:w-64">
          <label class="text-sm text-slate-400">Tier</label>
          <div class="mt-2 flex gap-2">
            <button id="btnLunatic" class="btn-tier w-full" onclick="setTier('LUNATIC')">LUNATIC</button>
            <button id="btnAeris" class="btn-tier w-full" onclick="setTier('AERIS')">AERIS</button>
            <button id="btnSierra" class="btn-tier w-full" onclick="setTier('SIERRA')">SIERRA</button>
          </div>
        </div>
      </div>
    </section>

    <section class="glass p-6 rounded-3xl" data-anim="3">
      <div class="flex items-center justify-between gap-3">
        <div>
          <h2 class="text-lg font-semibold">Module List</h2>
          <p class="text-xs text-slate-400">Menampilkan semua field, urut kebawah.</p>
        </div>
        <div class="text-xs text-slate-400" id="countText">-</div>
      </div>

      <div id="list" class="mt-4 space-y-4"></div>

      <div id="emptyState" class="hidden text-slate-400 text-center py-10">Tidak ada data.</div>
    </section>
  </div>

  <!-- Edit modal -->
  <div id="editOverlay" class="fixed inset-0 z-[200] hidden">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
    <div class="relative h-full w-full flex items-center justify-center p-4">
      <div class="glass rounded-3xl p-6 w-full max-w-2xl">
        <div class="flex items-center justify-between gap-3">
          <h3 class="text-lg font-bold">Edit Module</h3>
          <button id="btnCloseEdit" class="p-2 bg-slate-900 rounded-xl hover:bg-slate-800 transition"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-3">
          <input type="text" id="f_lisensiKey" class="w-full bg-black border border-slate-800 p-3 rounded-xl outline-none" disabled />
          <input type="text" id="f_username" class="w-full bg-black border border-slate-800 p-3 rounded-xl outline-none" placeholder="Username" />
          <input type="text" id="f_device" class="w-full bg-black border border-slate-800 p-3 rounded-xl outline-none" placeholder="Device" />
          <input type="text" id="f_deviceId" class="w-full bg-black border border-slate-800 p-3 rounded-xl outline-none" placeholder="DeviceId" />
          <input type="text" id="f_type" class="w-full bg-black border border-slate-800 p-3 rounded-xl outline-none" placeholder="Type" />
          <input type="text" id="f_exp" class="w-full bg-black border border-slate-800 p-3 rounded-xl outline-none" placeholder="Exp" />
          <input type="text" id="f_status" class="w-full bg-black border border-slate-800 p-3 rounded-xl outline-none" placeholder="Status" />
        </div>

        <div class="mt-4 flex gap-3">
          <button id="btnSaveEdit" class="flex-1 bg-violet-600 text-white font-bold py-3 rounded-xl hover:bg-violet-700 transition"><i class="fa-solid fa-floppy-disk mr-2"></i>Save</button>
          <button id="btnCancelEdit" class="flex-1 bg-slate-900 text-slate-200 font-bold py-3 rounded-xl hover:bg-slate-800 transition">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // particles ungu + titik putih + garis ungu
    particlesJS('particles-js', {
      particles: {
        number: { value: 65 },
        color: { value: '#8b5cf6' },
        opacity: { value: 0.35 },
        size: { value: 2 },
        line_linked: { enable: true, opacity: 0.6, width: 1.2 },
        move: { speed: 1.35 }
      },
      interactivity: {
        events: {
          onhover: { enable: true, mode: 'repulse' },
          onclick: { enable: false }
        },
        modes: { repulse: { distance: 110 } }
      },
      retina_detect: true
    });
  </script>

  <script src="script.js"></script>  <script>
    // inventory page logic (standalone)
    let currentTier = 'LUNATIC';
    let currentEditKey = null;

    function setTier(tier){
      currentTier = tier;
      // highlight
      document.querySelectorAll('button.btn-tier').forEach(b => b.classList.remove('btn-active'));
      const map = {LUNATIC:'btnLunatic', AERIS:'btnAeris', SIERRA:'btnSierra'};
      const el = qs(map[tier]);
      if(el) el.classList.add('btn-active');
      loadModules();
    }

    function matchSearch(item, q){
      if(!q) return true;
      const s = q.toLowerCase();
      const blob = [
        item.key,
        item.LisensiKey,
        item.Device,
        item.Exp,
        item.Username,
        item.Type,
        item.DeviceId,
        item.Status,
        item.ID
      ].filter(Boolean).join(' ').toLowerCase();
      return blob.includes(s);
    }

    function renderItem(item){
      // Render urut kebawah semua field yang ada
      const fields = [];
      const push = (label, val) => {
        if(val === undefined || val === null || val === '') return;
        fields.push(`<div class="py-1"><span class="text-slate-400 text-xs">${label}</span><div class="text-sm font-semibold break-all">${String(val)}</div></div>`);
      };

      push('Lisensi Key', item.LisensiKey ?? item.key);
      push('Device Limit', item.Device ?? item.deviceLimit);
      push('Exp', item.Exp ?? item.exp);
      push('Name', item.Name ?? item.name);
      push('Type', item.Type ?? item.type);
      push('Device id', item.DeviceId ?? item.deviceId);
      push('Status', item.Status ?? item.status);
      push('Username', item.Username ?? item.username);

      const status = item.Status ?? item.status ?? '';
      const statusTag = status ? `<span class="inline-flex items-center px-3 py-1 rounded-xl text-xs font-bold border border-slate-800">${status}</span>` : '';

      return `
        <div class="bg-black/40 border border-slate-800 rounded-3xl p-5">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <div class="text-sm text-slate-400">Module</div>
              <div class="mt-1 text-base font-extrabold break-all">${item.LisensiKey ?? item.key ?? '-'}</div>
              <div class="mt-3">${fields.join('')}</div>
            </div>
            <div class="shrink-0 text-right">
              <div class="mb-3">${statusTag}</div>
              <div class="flex flex-col gap-2">
                <button class="px-3 py-2 rounded-xl bg-slate-900 hover:bg-slate-800 transition text-white font-bold" onclick="openEdit('${encodeURIComponent(item.key)}')"><i class="fa-solid fa-pen-to-square mr-2"></i>Edit</button>
                <button class="px-3 py-2 rounded-xl bg-rose-950 hover:bg-rose-900 transition text-rose-300 font-bold" onclick="deleteModule('${encodeURIComponent(item.key)}')"><i class="fa-solid fa-trash mr-2"></i>Delete</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    async function loadModules(){
      const q = (qs('searchBox')?.value || '').trim();
      const listEl = qs('list');
      const emptyEl = qs('emptyState');
      if(!listEl) return;

      listEl.innerHTML = '';
      emptyEl.classList.add('hidden');

      try{
        const folder = TIER_TO_FOLDER[currentTier] || currentTier;
        const res = await fetch(`${RTDB_BASE}/${encodeURIComponent(folder)}.json`);
        const data = await res.json();
        if(!res.ok){
          listEl.innerHTML = `<div class="text-slate-400">Failed to load.</div>`;
          return;
        }

        const items = [];
        if(data && typeof data === 'object'){
          for(const [k, v] of Object.entries(data)){
            if(v && typeof v === 'object'){
              v.key = k;
              items.push(v);
            }
          }
        }

        const filtered = items.filter(it => matchSearch(it, q));

        qs('countText').innerText = `${filtered.length} item(s)`;

        if(filtered.length === 0){
          emptyEl.classList.remove('hidden');
          return;
        }

        // sort by LisensiKey then Device then Exp then Username
        filtered.sort((a,b)=>{
          const ak = (a.LisensiKey ?? a.key ?? '');
          const bk = (b.LisensiKey ?? b.key ?? '');
          if(ak < bk) return -1; if(ak > bk) return 1;
          const ad = String(a.Device ?? '');
          const bd = String(b.Device ?? '');
          if(ad < bd) return -1; if(ad > bd) return 1;
          const ae = String(a.Exp ?? '');
          const be = String(b.Exp ?? '');
          if(ae < be) return -1; if(ae > be) return 1;
          const au = String(a.Username ?? '');
          const bu = String(b.Username ?? '');
          if(au < bu) return -1; if(au > bu) return 1;
          return 0;
        });

        listEl.innerHTML = filtered.map(renderItem).join('');
      }catch(_){
        listEl.innerHTML = `<div class="text-slate-400">Failed to load.</div>`;
      }
    }

    function openEdit(encodedKey){
      const key = decodeURIComponent(encodedKey);
      currentEditKey = key;

      (async()=>{
        try {
          const folder = TIER_TO_FOLDER[currentTier] || currentTier;
          const res = await fetch(`${RTDB_BASE}/${encodeURIComponent(folder)}/${encodeURIComponent(key)}.json`);
          const item = await res.json();
          if (item) {
            qs('f_lisensiKey').value = item.LisensiKey ?? key;
            qs('f_username').value = item.Username ?? '';
            qs('f_device').value = item.Device ?? '';
            qs('f_deviceId').value = item.DeviceId ?? '';
            qs('f_type').value = item.Type ?? '';
            qs('f_exp').value = item.Exp ?? '';
            qs('f_status').value = item.Status ?? '';

            qs('editOverlay').classList.remove('hidden');
          }
        } catch(e) {
          alert('Gagal mengambil data module.');
        }
      })();
    }

    function closeEdit(){
      qs('editOverlay').classList.add('hidden');
      currentEditKey = null;
    }

    async function saveEdit(){
      if(!currentEditKey) return;
      const folder = TIER_TO_FOLDER[currentTier] || currentTier;
      const payload = {
        LisensiKey: qs('f_lisensiKey').value,
        Username: qs('f_username').value,
        Device: qs('f_device').value,
        DeviceId: qs('f_deviceId').value,
        Type: qs('f_type').value,
        Exp: qs('f_exp').value,
        Status: qs('f_status').value
      };

      try {
        const res = await fetch(`${RTDB_BASE}/${encodeURIComponent(folder)}/${encodeURIComponent(currentEditKey)}.json`, {
          method: 'PUT',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        });
        if(res.ok){
          closeEdit();
          loadModules();
        } else {
          alert('Update failed');
        }
      } catch(e) {
        alert('Gagal menyimpan data.');
      }
    }

    async function deleteModule(encodedKey){
      const key = decodeURIComponent(encodedKey);
      if(!confirm('Delete module: ' + key + ' ?')) return;
      try {
        const folder = TIER_TO_FOLDER[currentTier] || currentTier;
        const res = await fetch(`${RTDB_BASE}/${encodeURIComponent(folder)}/${encodeURIComponent(key)}.json`, {
          method: 'DELETE'
        });
        if(res.ok) loadModules();
        else alert('Delete failed');
      } catch(e) {
        alert('Gagal menghapus data.');
      }
    }

    document.addEventListener('DOMContentLoaded', async ()=>{
      await fetchAccountInfo();

      // read tier from querystring
      const params = new URLSearchParams(location.search);
      const t = (params.get('tier') || '').toUpperCase().trim();
      if(t === 'LUNATIC' || t === 'AERIS' || t === 'SIERRA') currentTier = t;

      setTier(currentTier);

      qs('searchBox').addEventListener('input', () => loadModules());

      qs('btnCloseEdit').addEventListener('click', closeEdit);
      qs('btnCancelEdit').addEventListener('click', closeEdit);
      qs('btnSaveEdit').addEventListener('click', saveEdit);

      qs('editOverlay').addEventListener('click', (e)=>{
        if(e.target === qs('editOverlay')) closeEdit();
      });
    });

    window.setTier = setTier;
    window.logout = logout;
    window.openEdit = openEdit;
    window.deleteModule = deleteModule;
  </script>
</body>
</html>
